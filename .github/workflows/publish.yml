# .github/workflows/publish.yml

name: Publish Website

on:
  schedule:
    - cron: '0 */8 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      kroki:
        image: yuzutech/kroki
        ports:
          - 8000:8000
        options: >-
          --health-cmd="curl http://localhost:8000/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Antora
        run: npm ci antora

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz

      # ────────────────────────────────────────────────────
      # 1) Generate the HTML site
      - name: Generate HTML Site
        run: npx antora antora-playbook.yml

      # 2) Build PDF via Ruby asciidoctor-pdf (loads your pass_q_fix.rb)
      - name: Build PDF with Asciidoctor-PDF
        run: |
          gem install asciidoctor-pdf rouge
          asciidoctor-pdf \
            -r ./extensions/pass_q_fix.rb \
            -a pdf-theme=pdf-theme.yml \
            -D build/pdf \
            index.adoc

      # 3) Upload the PDF as an artifact
      - name: Upload PDF artifact
        uses: actions/upload-artifact@v2
        with:
          name: aas-specifications.pdf
          path: build/pdf/*.pdf
      # ────────────────────────────────────────────────────

      # 4) Upload the generated HTML for Pages
      - name: Upload Site to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

      # 5) Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
