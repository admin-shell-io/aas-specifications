#
# Publish to GitHub Pages
# Initially based on the instructions in Antora Docs
# https://docs.antora.org/antora/latest/publish-to-github-pages/
#

name: Publish Website

on:
  schedule:
    - cron: '0 */8 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      kroki:
        image: yuzutech/kroki
        ports:
          - 8000:8000
        options: >-
          --health-cmd="curl http://localhost:8000/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Antora
        run: npm i antora

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Graphviz
        run: sudo apt update && sudo apt install -y graphviz

      - name: List all AsciiDoc files
        run: find . -type f -name '*.adoc'

      - name: Preprocess underline constraints for PDF
        run: |
          find . -type f -name '*.adoc' -print0 \
            | xargs -0 sed -i -E 's|<span class="underline">([^<]*)</span>|[underline]#\1#|g'

      - name: Generate Site
        run: npx antora antora-playbook.yml

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  pdf:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install Asciidoctor PDF
        run: gem install asciidoctor-pdf rouge

      - name: Build PDF
        run: |
          asciidoctor-pdf \
            -r ./extensions/pass_q_fix.rb \
            -a pdf-theme=pdf-theme.yml \
            -D build/pdf \
            index.adoc

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v2
        with:
          name: aas-specifications-pdf
          path: build/pdf/*.pdf
